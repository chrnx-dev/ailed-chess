name: Bug Report
description: Report incorrect behavior in the psyche system, EQ signal chain, or phase detection
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check that `pytest` passes on the latest `main` and that the behavior is reproducible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug
      placeholder: e.g. "Phase detection returns 'opening' after a queen sacrifice on move 5"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal code or sequence of moves that triggers the bug
      placeholder: |
        ```python
        from ailed.psyche import PsycheCalculator
        import chess

        calc = PsycheCalculator()
        board = chess.Board()
        # ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened? Include output, psyche values, phase string, etc.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 1.0.1 or git SHA
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g. 3.11.9
    validations:
      required: false
